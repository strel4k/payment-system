spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: test-user
      password: test-password

fake-provider:
  username: merchant-1
  password: secret123

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

logging:
  level:
    com.example.paymentservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG