spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

logging:
  level:
    com.example.payment: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG