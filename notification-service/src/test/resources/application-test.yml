spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: localhost
    port: 3025

kafka:
  topics:
    notification-created: notification.created

notification:
  email:
    from: noreply@test.com

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  health:
    mail:
      enabled: false

logging:
  level:
    com.example.notificationservice: DEBUG
    org.hibernate.SQL: DEBUG