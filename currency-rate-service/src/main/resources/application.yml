server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: currency-rate-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/currency}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true

exchange-rate:
  api-key: ${EXCHANGE_RATE_API_KEY:demo}
  base-url: ${EXCHANGE_RATE_BASE_URL:https://v6.exchangerate-api.com}
  base-currency: USD
  update-interval-ms: ${RATE_UPDATE_INTERVAL_MS:3600000}
  rate-ttl-hours: ${RATE_TTL_HOURS:2}
  lock-at-most-for: PT10M
  lock-at-least-for: PT5M

logging:
  level:
    root: INFO
    com.example.currencyrate: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://currency-postgres:5432/currency
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false